<!DOCTYPE html>
<html>
<head>
	<title>Laravel Assistant</title>
	<!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"></link> -->
	<link href="../static/css/bootstrap.min.css" rel="stylesheet"></link>
</head>
	<body class="container mt-5">
		<h2>Laravel Assistant</h2>
		<form id="query_form">
			<div class="mb-3">
				<input id="query_input" class="form-control" placeholder="Ask question from Laravel Documentation...">
			</div>
			<button class="btn btn-primary">Ask</button>
		</form>
		<div id="loading" class="mt-3" style="display:none;">
			<div class="spinner-border text-primary" role="status">
				<span class="visually-hidden">Loading......</span>			
			</div>
			<span class="ms-2">Searching Documentation</span>
		</div>
		<hr>
		<h5>Answer</h5>
		<p id="answer"></p>
		<!-- <h6>Confidence</h6>
		<p id="confidence"></p>
		<h6>Source</h6>
		<p id="source"></p> -->
   <p> |<span id="confidence1"></span>-Confidence | <span id="source1"></span> | <span id="latency_total"></span>s |</p>
		
	<script type="module" src="../static/js/main.js"></script>
  <!-- <script type="module" src="{url_for('static',filename='js/main.js')}"></script> -->
	</body>


	
</html>
